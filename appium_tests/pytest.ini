[pytest]
# ─── Civic Reporter Appium Test Suite ───────────────────────────
testpaths        = .
python_files     = test_*.py
python_classes   = Test*
python_functions = test_*

# Execution order follows filename sort (01 → 08)
addopts =
    -v
    --tb=short
    --capture=no
    --show-capture=all
    -p no:warnings

# Logging
log_cli            = true
log_cli_level      = INFO
log_cli_format     = %(asctime)s [%(levelname)s] %(name)s — %(message)s
log_cli_date_format= %H:%M:%S
log_file           = reports/test_execution.log
log_file_level     = DEBUG
log_file_format    = %(asctime)s [%(levelname)-8s] %(name)s — %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Timeout per test (seconds) — prevents hanging sessions
timeout = 180

# Markers
markers =
    smoke:      Fast smoke tests (TC01-TC10)
    regression: Full regression suite
    e2e:        End-to-end journey (test_08)
    auth:       Authentication tests
    home:       Home Dashboard tests
    report:     Report Issue tests
    myreports:  My Reports tests
    map:        Map Screen tests
    profile:    Profile & Notifications tests
    officer:    Officer Portal tests
