name: Deploy Mobile App
run-name: Deploy Mobile App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy_mobile:
    name: Build & Deploy Mobile App (Android APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Flutter APK
        run: flutter build apk --release

      - name: Upload Mobile APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Civic_Reporter_Mobile_App_APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create or Update GitHub Release with APK
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: v1.0.0
          name: "Civic Reporter v1.0.0 Mobile APK"
          body: "Direct download link for Civic Reporter Android APK"
          files: build/app/outputs/flutter-apk/app-release.apk
