name: Civic Reporter Master CI/CD Suite & App Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  master_pipeline:
    name: Test Suites, Excel Reports, Web & Mobile Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Test Suite Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pytest requests locust

      - name: Execute Appium Mobile Test Suite (400 Cases)
        run: python appium_tests/generate_full_report.py

      - name: Execute Selenium Web Test Suite (400 Cases)
        run: python selenium_tests/generate_full_report.py

      - name: Execute Vulnerability Security Suite (400 Cases)
        run: python vulnerability_tests/run_vulnerability_tests.py

      - name: Execute Load & Baseline Performance Suite (400 Cases)
        run: python load_tests/generate_report.py

      - name: Generate Consolidated Master Excel Report
        run: python generate_combined_excel_report.py

      - name: Upload Excel Test Reports Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: civic-reporter-test-reports-1600-cases
          path: |
            Civic_Reporter_Appium_Test_Report.xlsx
            Civic_Reporter_Selenium_Test_Report.xlsx
            Civic_Reporter_Vulnerability_Test_Report.xlsx
            Civic_Reporter_Load_Baseline_Test_Report.xlsx
            Civic_Reporter_Combined_Report.xlsx
          retention-days: 30

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Packages
        run: flutter pub get

      - name: Build Flutter Web Release
        run: flutter build web --release

      - name: Upload Web App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Civic_Reporter_Web_App
          path: build/web
          retention-days: 30

      - name: Build Flutter Mobile Release (APK)
        run: flutter build apk --release

      - name: Upload Mobile APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Civic_Reporter_Mobile_App_APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Deploy Web App to Vercel
        uses: amondnet/vercel-action@v20
        continue-on-error: true
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
          prod: true
