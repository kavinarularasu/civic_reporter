name: Civic Reporter Automated Test Suite & Deploy to Vercel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run_test_suites_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python for Automated Testing Suites
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install Test Dependencies
      - name: Install Test Suite Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pytest requests locust

      # Execute Appium Mobile Test Suite (400 Cases) & Report
      - name: Execute Appium Mobile Test Suite (400 Cases)
        run: python appium_tests/generate_full_report.py

      # Execute Selenium Web Test Suite (400 Cases) & Report
      - name: Execute Selenium Web Test Suite (400 Cases)
        run: python selenium_tests/generate_full_report.py

      # Execute Vulnerability Security Suite (400 Cases) & Report
      - name: Execute Vulnerability Security Suite (400 Cases)
        run: python vulnerability_tests/run_vulnerability_tests.py

      # Execute Load & Baseline Performance Suite (400 Cases) & Report
      - name: Execute Load & Baseline Performance Suite (400 Cases)
        run: python load_tests/generate_report.py

      # Generate Consolidated Master Excel Report (1,600 Total Cases)
      - name: Generate Consolidated Master Excel Report
        run: python generate_combined_excel_report.py

      # Upload Test Reports as GitHub Actions Artifacts
      - name: Upload Excel Test Reports Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: civic-reporter-test-reports-1600-cases
          path: |
            Civic_Reporter_Appium_Test_Report.xlsx
            Civic_Reporter_Selenium_Test_Report.xlsx
            Civic_Reporter_Vulnerability_Test_Report.xlsx
            Civic_Reporter_Load_Baseline_Test_Report.xlsx
            Civic_Reporter_Combined_Report.xlsx
          retention-days: 30

      # Set up Flutter SDK
      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        continue-on-error: true
        with:
          channel: 'stable'
          cache: true

      # Get Flutter dependencies
      - name: Get Flutter Packages
        continue-on-error: true
        run: flutter pub get

      # Build Flutter web app
      - name: Build Flutter Web
        continue-on-error: true
        run: flutter build web --release

      # Deploy to Vercel
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        continue-on-error: true
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
          prod: true
