name: Appium Testing

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  appium_test_execution:
    name: Appium Testing (400 Test Cases)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pytest

      - name: Execute Appium 400 Test Cases
        run: pytest appium_tests/test_extended_400_cases.py -v

      - name: Generate Appium Excel Report & Pie Chart
        run: python appium_tests/generate_full_report.py

      - name: Upload Appium Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Civic_Reporter_Appium_Test_Report
          path: Civic_Reporter_Appium_Test_Report.xlsx
          retention-days: 30
